name = "lunaric-dev"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-18"

# Serve directly on the custom domain (auto-creates DNS + managed TLS cert).
routes = [
  { pattern = "lunaric.dev", custom_domain = true },
  { pattern = "www.lunaric.dev", custom_domain = true },
]

# Build the Rust Worker to WebAssembly.
# --no-panic-recovery avoids wasm-bindgen's externref catch-wrappers, which are
# broken under Rust >=1.82 + wasm-bindgen 0.2.125 ("externref table required").
[build]
command = "worker-build --release --no-panic-recovery"

# Static assets (CSS, JS, images) served directly from Cloudflare's edge.
# The Worker handles every route that isn't a matching static file.
[assets]
directory = "./assets"
binding = "ASSETS"

# D1 (SQLite at the edge) — view counters, guestbook, request log.
[[d1_databases]]
binding = "DB"
database_name = "lunaric-dev"
database_id = "cf5f6ccb-ff1b-43c0-abc0-3f6c319c2bb3"

# NOTE: rate limiting is implemented in D1 (see rl_allow in src/lib.rs) because the
# native Workers rate-limit binding can't be cast by workers-rs yet (issue #700).
# NOTE: a daily cron to prune the request log is available, but registering it
# needs the "Workers Schedules" permission on the API token. Re-enable with:
#   [triggers]
#   crons = ["0 4 * * *"]
# (the scheduled handler is already implemented in src/lib.rs)
